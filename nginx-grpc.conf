# Nginx configuration for gRPC load balancing
# Place this in /etc/nginx/sites-available/file-service

upstream file_service_grpc {
    # Load balance across 4 instances
    server localhost:50051;
    server localhost:50052;
    server localhost:50053;
    server localhost:50054;
}

server {
    listen 50050 http2;
    server_name localhost;

    # Disable gzip for gRPC (HTTP/2 handles it)
    gzip off;

    location / {
        # Forward to upstream backend
        grpc_pass grpc://file_service_grpc;

        # Required for gRPC
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        grpc_connect_timeout 10s;
        grpc_send_timeout 10s;
        grpc_read_timeout 10s;

        # Buffer settings for large messages
        grpc_buffer_size 4m;

        # Enable keep-alive
        grpc_pass_request_body on;
        grpc_pass_request_headers on;
    }

    # Health check endpoint (optional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
